<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Quantum Physician</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #131e3d;
            --navy-light: #1a2a50;
            --teal: #5ba8b2;
            --teal-light: #7dc4cd;
            --teal-dark: #4a939c;
            --white: #ffffff;
            --text-light: rgba(255,255,255,0.85);
            --text-muted: rgba(255,255,255,0.5);
            --error: #e85d5d;
            --success: #5bb88c;
            --border-subtle: rgba(91,168,178,0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lato', sans-serif;
            background: var(--navy);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(91,168,178,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(201,169,110,0.06) 0%, transparent 50%);
            pointer-events: none;
        }
        .site-header {
            position: relative; z-index: 10;
            padding: 20px 40px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-subtle);
        }
        .site-header a { text-decoration: none; }
        .logo-area { display: flex; align-items: center; gap: 14px; }
        .logo-img { height: 40px; width: auto; flex-shrink: 0; }

        .main-container {
            position: relative; z-index: 1; flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            width: 100%; max-width: 440px;
            background: linear-gradient(170deg, var(--navy-light) 0%, var(--navy) 100%);
            border: 1px solid var(--border-subtle);
            border-radius: 16px; padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-title {
            font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600;
            text-align: center; margin-bottom: 6px;
        }
        .auth-subtitle {
            text-align: center; color: var(--text-muted); font-size: 15px;
            margin-bottom: 32px; font-weight: 300; line-height: 1.5;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block; font-size: 12px; font-weight: 600; letter-spacing: 1.2px;
            text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
        }
        .form-input {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: var(--white); font-family: 'Lato', sans-serif;
            font-size: 15px; outline: none; transition: all 0.3s;
        }
        .form-input::placeholder { color: rgba(255,255,255,0.25); }
        .form-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(91,168,178,0.15); }
        .submit-btn {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            color: var(--white); font-family: 'Lato', sans-serif; font-size: 15px;
            font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s; margin-top: 6px;
        }
        .submit-btn:hover { box-shadow: 0 6px 25px rgba(91,168,178,0.35); transform: translateY(-1px); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .submit-btn .spinner {
            display: none; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        .submit-btn.loading .spinner { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message-box {
            display: none; padding: 12px 16px; border-radius: 10px;
            font-size: 14px; line-height: 1.5; margin-bottom: 20px; text-align: center;
        }
        .message-box.error { display: block; background: rgba(232,93,93,0.12); border: 1px solid rgba(232,93,93,0.3); color: var(--error); }
        .message-box.success { display: block; background: rgba(91,184,140,0.12); border: 1px solid rgba(91,184,140,0.3); color: var(--success); }
        .site-footer {
            position: relative; z-index: 1; text-align: center; padding: 20px;
            border-top: 1px solid var(--border-subtle);
        }
        .site-footer p { color: var(--text-muted); font-size: 12px; }
        .site-footer a { color: var(--teal); text-decoration: none; }
        @media (max-width: 500px) {
            .site-header { padding: 16px 20px; }
            .auth-card { padding: 36px 24px; }
            .auth-title { font-size: 24px; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="/" class="logo-area">
            <img src="../assets/images/qp-logo.png" alt="Quantum Physician" class="logo-img">
        </a>
    </header>

    <main class="main-container">
        <div class="auth-card">
            <h1 class="auth-title">Set New Password</h1>
            <p class="auth-subtitle">Enter your new password below.</p>
            <div class="message-box" id="message-box"></div>
            <form id="reset-form">
                <div class="form-group">
                    <label class="form-label" for="new-password">New Password</label>
                    <input class="form-input" type="password" id="new-password" placeholder="New password (6+ characters)" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input class="form-input" type="password" id="confirm-password" placeholder="Re-enter new password" required minlength="6">
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">
                    <span class="spinner"></span>
                    <span class="btn-text">Update Password</span>
                </button>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 <a href="/">Quantum Physician</a> &middot; Dr. Tracey Clark</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://rihlrfiqokqrlmzjjyxj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpaGxyZmlxb2txcmxtempqeXhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MTU2NDYsImV4cCI6MjA4NDA5MTY0Nn0.G2TQKSmQpPYb8Cyzo7R833G7xkr0855faLRjrJ9ov-4';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const msgBox = document.getElementById('message-box');
        const form = document.getElementById('reset-form');
        const btn = document.getElementById('submit-btn');

        function showMsg(text, type) {
            msgBox.textContent = text;
            msgBox.className = 'message-box ' + type;
        }

        form.addEventListener('submit', async e => {
            e.preventDefault();
            const pw = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (pw !== confirm) return showMsg('Passwords do not match.', 'error');
            if (pw.length < 6) return showMsg('Password must be at least 6 characters.', 'error');

            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const { error } = await sb.auth.updateUser({ password: pw });
                if (error) throw error;
                showMsg('Password updated! Redirecting to your dashboard...', 'success');
                setTimeout(() => window.location.href = '/members/dashboard.html', 1500);
            } catch (err) {
                showMsg(err.message || 'Failed to update password. Try again.', 'error');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
